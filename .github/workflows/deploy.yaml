name: Trigger Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Trigger aaPanel Webhook
        run: |
          echo "Starting trigger"
          curl -X POST "${{ vars.AAPANEL_TRIGGER }}"
          echo "Trigger success"
